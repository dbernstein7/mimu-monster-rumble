<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, interactive-widget=resizes-content" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="description" content="MIMU VS MONSTER RUMBLE — survive waves of Halloween monsters, defeat bosses, and climb the leaderboard." />
    <meta name="theme-color" content="#1a0a2e" />
    <meta property="og:title" content="MIMU VS MONSTER RUMBLE" />
    <meta property="og:description" content="Survive the Rumble. Be the Legend." />
    <meta property="og:type" content="website" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;600;700&family=Orbitron:wght@700;900&display=swap"
      rel="stylesheet"
    />
    <title>MIMU VS MONSTER RUMBLE</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        width: 100%;
        height: 100%;
        min-height: 100dvh;
        min-height: -webkit-fill-available;
        overflow: hidden;
        overscroll-behavior: none;
        background: #000000;
        touch-action: none;
        -webkit-tap-highlight-color: transparent;
      }
      body {
        position: fixed;
        inset: 0;
      }
      #game-container {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        height: 100dvh;
        height: -webkit-fill-available;
        background: #000000;
      }
      #game-container canvas {
        display: block;
      }
      #boot-loader {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1rem;
        background: #1a0a2e;
        color: #ffc857;
        font-family: 'Orbitron', system-ui, sans-serif;
        letter-spacing: 0.08em;
        z-index: 1;
        transition: opacity 0.4s ease;
      }
      #boot-loader.hidden {
        opacity: 0;
        pointer-events: none;
      }
      #boot-loader p {
        font-size: 0.85rem;
        opacity: 0.85;
      }
      #game-container.mobile-hidden {
        visibility: hidden;
        pointer-events: none;
      }
      #rotate-prompt {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        display: none;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1rem;
        padding: 2rem;
        background: #1a0a2e;
        color: #ffc857;
        font-family: 'Orbitron', system-ui, sans-serif;
        text-align: center;
        z-index: 5;
      }
      #rotate-prompt.visible {
        display: flex;
      }
      #rotate-prompt p {
        font-family: 'Exo 2', system-ui, sans-serif;
        color: #f5f0ff;
        max-width: 20rem;
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <div id="rotate-prompt" aria-live="polite">
      <strong>Rotate your device</strong>
      <p>MIMU VS MONSTER RUMBLE plays in landscape. Turn your phone sideways to continue.</p>
    </div>
    <div id="boot-loader" aria-live="polite">
      <strong>MIMU VS MONSTER RUMBLE</strong>
      <p>Loading assets…</p>
    </div>
    <div id="game-container" tabindex="0"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
